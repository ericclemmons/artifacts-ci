# Based on https://viteplus.dev/guide/ci#github-actions
name: CI

on:
  pull_request:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          cache: true
      - run: vp install
      - run: vp check
      - run: vp test
      - run: vp build
