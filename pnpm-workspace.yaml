packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  core-js-pure: true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  "@cloudflare/sandbox": 0.9.2
  "@types/node": ^24.12.2
  agents: ^0.11.9
  hono: 4.12.15
  typescript: ~6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.20
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wrangler: ^4.89.1

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
