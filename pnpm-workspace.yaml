packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  core-js-pure: true
  esbuild: true
  sharp: true
  workerd: true

catalog:
  "@cloudflare/dynamic-workflows": ^0.1.1
  "@cloudflare/sandbox": 0.9.2
  "@types/node": ^25.8.0
  agents: ^0.12.4
  hono: 4.12.15
  typescript: ~6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.21
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wrangler: ^4.91.0

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
