packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@cloudflare/sandbox": 0.9.2
  "@types/node": ^24.12.2
  agents: ^0.11.9
  hono: 4.12.15
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.19
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wait-on: ^9.0.5

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
